{% extends "base/base.html" %}

{% block header %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-panel">
    <h1>Login</h1>

    <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
        <input type="hidden" name="next" value="{{ next_url }}">

        <p class="auth-row">
            <label for="identifier">Username or email:</label><br>
            <input type="text" id="identifier" name="identifier" value="{{ form_data.identifier }}"
                placeholder="Enter username or email" required>
            {% if errors.identifier %}
            <small class="auth-error">{{ errors.identifier }}</small>
            {% endif %}
        </p>

        <p class="auth-row">
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
            {% if errors.password %}
            <small class="auth-error">{{ errors.password }}</small>
            {% endif %}
        </p>

        <p class="auth-checkbox">
            <label>
                <input type="checkbox" name="remember" value="1" {% if form_data.remember %}checked{% endif %}>
                Remember me
            </label>
        </p>

        <button type="submit" class="auth-submit">Sign in</button>
    </form>
</div>
{% endblock %}
